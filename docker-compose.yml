# HireSignal - Docker Compose Configuration
# Usage: docker-compose up --build

version: "3.8"

services:
  # -------------------------------------------------------------------------
  # React Frontend Dashboard
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_HIRESIGNAL_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8000}
        VITE_HIRESIGNAL_API_KEY: ${API_KEY:-dev-api-key-change-in-production}
    container_name: hiresignal-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hiresignal-network

  # -------------------------------------------------------------------------
  # FastAPI Application
  # -------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hiresignal-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=HireSignal
      - APP_VERSION=1.0.0
      - DEBUG=false
      - ENVIRONMENT=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost:8000}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-HireSignal}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - WEB_DISCOVERY_ENABLED=${WEB_DISCOVERY_ENABLED:-true}
      - WEB_DISCOVERY_MAX_QUERIES=${WEB_DISCOVERY_MAX_QUERIES:-6}
      - WEB_DISCOVERY_MAX_RESULTS=${WEB_DISCOVERY_MAX_RESULTS:-5}
      - FIRECRAWL_ENABLED=${FIRECRAWL_ENABLED:-true}
      - FIRECRAWL_MAX_PAGES=${FIRECRAWL_MAX_PAGES:-5}
      - LINKEDIN_API_KEY=${LINKEDIN_API_KEY:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - TWITTER_API_KEY=${TWITTER_API_KEY:-}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET:-}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-}
      - API_KEY=${API_KEY:-dev-api-key-change-in-production}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION_NAME=hiresignal_skills
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - RATE_LIMIT_REQUESTS_PER_MINUTE=100
      - RESUME_WEIGHT=0.60
      - SOCIAL_WEIGHT=0.40
      - CACHE_TTL_SECONDS=86400
      - MAX_UPLOAD_SIZE_MB=10
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - LLM_FALLBACK_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - hiresignal-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # -------------------------------------------------------------------------
  # Celery Worker (Background Tasks)
  # -------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hiresignal-celery
    restart: unless-stopped
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=2
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost:8000}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-HireSignal}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - WEB_DISCOVERY_ENABLED=${WEB_DISCOVERY_ENABLED:-true}
      - WEB_DISCOVERY_MAX_QUERIES=${WEB_DISCOVERY_MAX_QUERIES:-6}
      - WEB_DISCOVERY_MAX_RESULTS=${WEB_DISCOVERY_MAX_RESULTS:-5}
      - FIRECRAWL_ENABLED=${FIRECRAWL_ENABLED:-true}
      - FIRECRAWL_MAX_PAGES=${FIRECRAWL_MAX_PAGES:-5}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - API_KEY=${API_KEY:-dev-api-key-change-in-production}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - hiresignal-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/venv/bin/celery -A backend.celery_app inspect ping --timeout=5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------------------------------
  # Celery Flower (Monitoring)
  # -------------------------------------------------------------------------
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hiresignal-flower
    restart: unless-stopped
    command: celery -A backend.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - hiresignal-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/5555'"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------------------------------
  # Redis (Cache & Message Broker)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hiresignal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hiresignal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------------------------
  # Qdrant (Vector Database)
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: hiresignal-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - hiresignal-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  hiresignal-network:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  redis-data:
    driver: local
  qdrant-data:
    driver: local
